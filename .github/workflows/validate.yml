name: Validate

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      github_actions: ${{ steps.filter.outputs.github_actions }}
      rust_checks: ${{ steps.filter.outputs.rust_checks }}
      release_workflow: ${{ steps.filter.outputs.release_workflow }}
      ui-build: ${{ steps.filter.outputs.ui-build }}
      ui-tests: ${{ steps.filter.outputs.ui-tests }}
      proto-lint: ${{ steps.filter.outputs.proto-lint }}
      source-lint: ${{ steps.filter.outputs.source-lint }}
      docs-freshness: ${{ steps.filter.outputs.docs-freshness }}
      license-check: ${{ steps.filter.outputs.license-check }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            github_actions:
              - '.github/workflows/**'
            rust_checks:
              - '.github/workflows/validate.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'rust-toolchain.toml'
              - 'rust-toolchain'
              - 'crates/**'
              - 'xtask/**'
            release_workflow:
              - '.github/workflows/release.yml'
            ui-build:
              - '.github/workflows/validate.yml'
              - 'crates/coral-api/proto/**'
              - 'ui/**'
            ui-tests:
              - '.github/workflows/validate.yml'
              - 'crates/coral-api/proto/**'
              - 'ui/**'
            proto-lint:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'crates/coral-api/buf.yaml'
              - 'crates/coral-api/proto/**/*.proto'
            source-lint:
              - '.github/workflows/validate.yml'
              - '.yamllint.yaml'
              - 'Makefile'
              - 'sources/**/*.yaml'
              - 'sources/**/*.yml'
            docs-freshness:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'xtask/**'
              - 'crates/coral-spec/**'
              - 'sources/core/**'
              - 'docs/**'
              - 'CHANGELOG.md'
            license-check:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'deny.toml'

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust_checks == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-validate-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: nextest

      - name: Run make rust-checks
        run: make rust-checks

  windows-rust-smoke:
    name: Windows Rust smoke
    runs-on: windows-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust_checks == 'true' || needs.changes.outputs.release_workflow == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-windows-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build CLI
        shell: pwsh
        run: cargo build --locked -p coral-cli --all-features

      - name: Smoke CLI
        shell: pwsh
        run: |
          .\target\debug\coral.exe --version
          .\target\debug\coral.exe source discover
          .\target\debug\coral.exe completion powershell > $null

  ui-build:
    name: UI build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ui-build == 'true' || needs.changes.outputs.rust_checks == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ui/.node-version
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Verify UI entrypoint
        run: test -s ui/dist/index.html

      - name: Verify production build excludes test mocks
        run: |
          if grep -R -E 'mockServiceWorker|setupWorker|@msw/playwright|mockScenario|PW_UI_SCREENCAST' ui/dist; then
            echo 'Production UI build contains test/mock-only code' >&2
            exit 1
          fi

  ui-tests:
    name: UI tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ui-tests == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ui/.node-version
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Type-check UI tests
        run: npm run test:ui:type-check --prefix ui

      - name: Install Chromium for Playwright
        run: npm exec --prefix ui -- playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run test:ui --prefix ui

      - name: Upload UI test artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-test-results
          path: |
            ui/test-results/**
            ui/playwright-report/**
          if-no-files-found: ignore

  proto-lint:
    name: Lint protobuf API
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.proto-lint == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install buf
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.69.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run make lint-proto
        run: make lint-proto

  gha-security-audit:
    name: Github Actions security audit with zizmor
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.github_actions == 'true' }}
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: v1.25.2
          annotations: ${{ github.event_name == 'pull_request' }}
          advanced-security: ${{ github.event_name != 'pull_request' }}
          min-severity: low

  source-lint:
    name: Lint source manifests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.source-lint == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-source-lint-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install ryl
        run: cargo install ryl --locked

      - name: Run make lint-sources
        run: make lint-sources

  docs-freshness:
    name: Docs freshness check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs-freshness == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-docs-freshness-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run make docs-check
        run: make docs-check

  license-check:
    name: Dependency license scan
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.license-check == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-license-check-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-deny

      - name: Run make license-check
        run: make license-check

  validate:
    runs-on: ubuntu-latest
    needs: [ changes, rust-checks, windows-rust-smoke, ui-build, ui-tests, proto-lint, gha-security-audit, source-lint, docs-freshness, license-check ]
    # Run even when upstream jobs fail or are conditionally skipped so this
    # job can act as the single required status check for the workflow.
    if: ${{ always() }}
    steps:
      - name: Check all job results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUST_CHECKS_RESULT: ${{ needs.rust-checks.result }}
          WINDOWS_RUST_SMOKE_RESULT: ${{ needs.windows-rust-smoke.result }}
          UI_BUILD_RESULT: ${{ needs.ui-build.result }}
          UI_TESTS_RESULT: ${{ needs.ui-tests.result }}
          PROTO_LINT_RESULT: ${{ needs.proto-lint.result }}
          GHA_SECURITY_AUDIT_RESULT: ${{ needs.gha-security-audit.result }}
          SOURCE_LINT_RESULT: ${{ needs.source-lint.result }}
          DOCS_FRESHNESS_RESULT: ${{ needs.docs-freshness.result }}
          LICENSE_CHECK_RESULT: ${{ needs.license-check.result }}
        run: |
          jobs=(
            "changes:$CHANGES_RESULT"
            "rust-checks:$RUST_CHECKS_RESULT"
            "windows-rust-smoke:$WINDOWS_RUST_SMOKE_RESULT"
            "ui-build:$UI_BUILD_RESULT"
            "ui-tests:$UI_TESTS_RESULT"
            "proto-lint:$PROTO_LINT_RESULT"
            "gha-security-audit:$GHA_SECURITY_AUDIT_RESULT"
            "source-lint:$SOURCE_LINT_RESULT"
            "docs-freshness:$DOCS_FRESHNESS_RESULT"
            "license-check:$LICENSE_CHECK_RESULT"
          )

          failed=0
          for job_status in "${jobs[@]}"; do
            job_name="${job_status%%:*}"
            result="${job_status#*:}"

            if [[ -z "$result" ]]; then
              echo "$job_name has no recorded result"
              failed=1
              continue
            fi

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "$job_name: $result"
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            exit 1
          fi
