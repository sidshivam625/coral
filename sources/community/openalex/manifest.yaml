          kind: path
          path:
            - publication_date
      - name: type
        type: Utf8
        nullable: true
        description: >-
          Work type (article, preprint, book, dataset, review, etc.).
        expr:
          kind: path
          path:
            - type
      - name: language
        type: Utf8
        nullable: true
        description: ISO 639-1 language code (e.g. en, fr, de).
        expr:
          kind: path
          path:
            - language
      - name: is_oa
        type: Boolean
        nullable: true
        description: Whether the work is open access.
        expr:
          kind: path
          path:
            - open_access
